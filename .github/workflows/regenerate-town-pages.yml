name: Regenerate town pages

# Runs on two triggers:
#   1. Push to main that touches data/njmls/** — i.e., Tyler drops in a new
#      monthly NJMLS Custom Export folder and pushes. The action then
#      regenerates all 70 pages and commits the rebuild back to main, which
#      Cloudflare Pages picks up and deploys.
#   2. Manual trigger from the Actions tab (workflow_dispatch). Handy when
#      we change generator code or curated content and want to force a
#      rebuild without dropping new CSVs.
#
# The action commits HTML, sitemap.xml, and AI-paragraph cache changes back
# to main. The path filter on the push trigger prevents the action's own
# commits (which touch *-real-estate/, sitemap.xml, data/ai-paragraphs/)
# from re-triggering the action — only data/njmls/** changes do.

on:
  push:
    branches: [main]
    paths:
      - 'data/njmls/**'
  workflow_dispatch:

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (fail fast before regenerating)
        run: npm test

      - name: Regenerate all 70 town pages with AI commentary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run generate

      - name: Commit and push if there are changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage anything the regen produced. .gitignore prevents node_modules,
          # .env, and *.log from being picked up here. If nothing changed
          # (cache hits across the board), the diff check exits early.
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit. Pages already match the data."
            exit 0
          fi
          git commit -m "chore(town-pages): monthly regeneration [skip ci]"
          git push origin main
