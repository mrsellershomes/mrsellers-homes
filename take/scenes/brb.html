<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>The Sellers Take — BRB</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/styles.css" />
<style>
  .brb-big { font-size: 140px; font-weight: 900; letter-spacing: -0.03em; line-height: 1; }
  .brb-sub { font-size: 22px; color: var(--text-muted-7); margin-top: 24px; font-weight: 500; }
  .brb-timer { font-family: var(--font-mono); font-size: 32px; color: var(--accent-red); margin-top: 36px; font-weight: 700; letter-spacing: 0.08em; }
</style>
</head>
<body class="stream-bg">
  <div class="center-wrap">
    <div class="brb-big">BE RIGHT BACK.</div>
    <div class="brb-sub">Grabbing a water. Back in a sec.</div>
    <div class="brb-timer" id="brb-timer">⏱ 00:00</div>
  </div>
  <div class="ticker" id="ticker">
    <div class="tag">NO BS</div>
    <div class="text">Real estate Twitter ≠ Bergen County.</div>
  </div>

  <script type="module">
    import { createTicker } from "../shared/ticker.js";
    import { EVERGREEN_LINES, ROTATION_INTERVAL_MS } from "../shared/evergreen.js";
    import { fetchState } from "../shared/api.js";

    const start = Date.now();
    const timerEl = document.getElementById("brb-timer");
    function tick() {
      const s = Math.floor((Date.now() - start) / 1000);
      const mm = String(Math.floor(s / 60)).padStart(2, "0");
      const ss = String(s % 60).padStart(2, "0");
      timerEl.textContent = `⏱ ${mm}:${ss}`;
    }
    setInterval(tick, 1000);

    const ticker = createTicker(document.getElementById("ticker"), {
      evergreen: EVERGREEN_LINES,
      fetchState,
      intervalMs: ROTATION_INTERVAL_MS,
      pollMs: 1500,
    });
    ticker.startRotation();
    ticker.startPolling();
  </script>
</body>
</html>
