<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>The Sellers Take — Screen Share</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/styles.css" />
<style>
  /* Screen Share scene: top bar covers macOS menu + Chrome tabs/URL/bookmarks
     so sensitive info (open tabs, URLs, system clock, etc.) is hidden. */
  body { background: transparent; }

  /* Top bar — covers ~180px of vertical space at the top of the captured display */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 180px;
    background: var(--bg-black);
    border-bottom: 3px solid var(--accent-red);
    display: flex;
    align-items: stretch;
    z-index: 2;
  }
  .top-bar .tag {
    background: var(--accent-red);
    color: var(--text-white);
    padding: 0 36px;
    display: flex;
    align-items: center;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    flex-shrink: 0;
    line-height: 1;
  }
  .top-bar .text {
    background: var(--panel-deep);
    color: var(--text-white);
    padding: 0 40px;
    flex: 1;
    display: flex;
    align-items: center;
    font-size: 34px;
    font-weight: 600;
    line-height: 1.2;
    transition: opacity 400ms ease;
  }
  .top-bar .text.fading { opacity: 0; }

  /* Just below the top bar — small show identity + LIVE indicator */
  .below-bar {
    position: absolute;
    top: 200px;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px;
    z-index: 3;
    pointer-events: none;
  }
  .below-bar .live-pill {
    background: var(--accent-red);
    color: var(--text-white);
    padding: 5px 13px;
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 0.2em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .below-bar .live-pill .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 8px rgba(255,255,255,0.7);
  }
  .below-bar .show-id {
    text-align: right;
  }
  .below-bar .show-id .name {
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 0.22em;
    color: var(--accent-red);
  }
  .below-bar .show-id .ep {
    font-size: 11px;
    color: var(--text-muted-7);
    letter-spacing: 0.22em;
    margin-top: 4px;
    font-weight: 700;
  }
</style>
</head>
<body>
  <div class="top-bar" id="ticker">
    <div class="tag">NO BS</div>
    <div class="text">Real estate Twitter ≠ Bergen County.</div>
  </div>

  <div class="below-bar">
    <div class="live-pill"><span class="dot"></span> LIVE</div>
    <div class="show-id">
      <div class="name">THE SELLERS TAKE</div>
      <div class="ep" id="ep-stamp">EP. 001</div>
    </div>
  </div>

  <script type="module">
    import { createTicker } from "../shared/ticker.js";
    import { EVERGREEN_LINES, ROTATION_INTERVAL_MS } from "../shared/evergreen.js";
    async function fetchState() {
      const r = await fetch("/api/topic", { cache: "no-store" });
      if (!r.ok) throw new Error("fetch failed");
      return r.json();
    }
    const ticker = createTicker(document.getElementById("ticker"), {
      evergreen: EVERGREEN_LINES,
      fetchState,
      intervalMs: ROTATION_INTERVAL_MS,
      pollMs: 5000,
    });
    ticker.startRotation();
    ticker.startPolling();
  </script>
</body>
</html>
