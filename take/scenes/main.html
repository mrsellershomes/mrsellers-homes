<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>The Sellers Take — Main</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/styles.css" />
<style>
  body { background: transparent; }
</style>
</head>
<body>
  <div class="name-card">
    <div class="name-big">TYLER SELLERS</div>
    <div class="name-sub">THE SELLERS TAKE</div>
  </div>
  <div class="live-badge">LIVE</div>
  <div class="ep-stamp" id="ep-stamp" style="display:none"></div>
  <div class="ticker" id="ticker">
    <div class="tag">NO BS</div>
    <div class="text">Buyers chasing deals are losing. Every single week.</div>
  </div>

  <script type="module">
    import { createTicker } from "../shared/ticker.js";
    import { EVERGREEN_LINES, ROTATION_INTERVAL_MS } from "../shared/evergreen.js";
    import { fetchState, applyEpisode } from "../shared/api.js";

    const epEl = document.getElementById("ep-stamp");

    async function fetchStateAndApply() {
      const s = await fetchState();
      applyEpisode(epEl, s);
      return s;
    }

    const ticker = createTicker(document.getElementById("ticker"), {
      evergreen: EVERGREEN_LINES,
      fetchState: fetchStateAndApply,
      intervalMs: ROTATION_INTERVAL_MS,
      pollMs: 5000,
    });
    ticker.startRotation();
    ticker.startPolling();
  </script>
</body>
</html>
