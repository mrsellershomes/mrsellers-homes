<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>The Sellers Take — Ending</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/styles.css" />
<style>
  .thats { font-size: 110px; font-weight: 900; letter-spacing: -0.03em; line-height: 1; }
  .thats .dot { color: var(--accent-red); }

  /* Like / Subscribe / Bell CTA — primary action on the ending scene */
  .cta-box {
    margin-top: 36px;
    background: var(--accent-red);
    padding: 22px 44px;
    display: inline-block;
    box-shadow: 0 0 0 0 rgba(255, 18, 0, 0.6);
    animation: cta-pulse 1.8s ease-in-out infinite;
  }
  .cta-line {
    font-size: 38px;
    font-weight: 900;
    letter-spacing: 0.04em;
    color: var(--text-white);
    line-height: 1;
    white-space: nowrap;
  }
  .cta-sub {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.9);
    margin-top: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  @keyframes cta-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 18, 0, 0.55); transform: scale(1); }
    50%      { box-shadow: 0 0 0 22px rgba(255, 18, 0, 0); transform: scale(1.025); }
  }

  .next { margin-top: 32px; font-size: 15px; color: var(--text-muted-7); letter-spacing: 0.24em; font-weight: 700; }
  .next strong { color: var(--text-white); }
  .handles { margin-top: 32px; font-size: 14px; color: var(--text-muted-7); font-weight: 600; letter-spacing: 0.12em; line-height: 1.8; }
  .handles .row { display: flex; gap: 28px; justify-content: center; flex-wrap: wrap; }
  .handles .label { color: var(--accent-red); font-weight: 900; font-size: 11px; letter-spacing: 0.28em; margin-right: 6px; }
</style>
</head>
<body class="stream-bg">
  <div class="center-wrap">
    <div class="thats">THAT'S THE TAKE<span class="dot">.</span></div>
    <div class="cta-box">
      <div class="cta-line">👍 LIKE   🔔 SUBSCRIBE   📌 BELL</div>
      <div class="cta-sub">Disagree with me? Subscribe and tell me.</div>
    </div>
    <div class="next" id="next-line"><strong>TURN ON NOTIFICATIONS</strong></div>
    <div class="handles">
      <div class="row"><span><span class="label">WEB</span>mrsellers.homes</span></div>
      <div class="row">
        <span><span class="label">IG</span>@tsellnj</span>
        <span><span class="label">TIKTOK</span>@tsellnj</span>
        <span><span class="label">YT</span>Bergen County Real Estate</span>
      </div>
    </div>
  </div>
  <div class="ticker" id="ticker">
    <div class="tag">NO BS</div>
    <div class="text">5–25 offers on every decent Bergen County listing.</div>
  </div>

  <script type="module">
    import { createTicker } from "../shared/ticker.js";
    import { EVERGREEN_LINES, ROTATION_INTERVAL_MS } from "../shared/evergreen.js";
    import { fetchState } from "../shared/api.js";

    async function fetchStateAndApply() {
      const s = await fetchState();
      const line = document.getElementById("next-line");
      if (s.nextEpisode && s.nextEpisode.trim()) {
        line.innerHTML = 'NEXT EPISODE \u00b7 <strong></strong>';
        line.querySelector("strong").textContent = s.nextEpisode;
      } else {
        line.innerHTML = '<strong>TURN ON NOTIFICATIONS</strong>';
      }
      return s;
    }
    const ticker = createTicker(document.getElementById("ticker"), {
      evergreen: EVERGREEN_LINES,
      fetchState: fetchStateAndApply,
      intervalMs: ROTATION_INTERVAL_MS,
      pollMs: 1500,
    });
    ticker.startRotation();
    ticker.startPolling();
  </script>
</body>
</html>
